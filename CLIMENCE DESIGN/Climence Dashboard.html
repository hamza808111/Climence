<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Climence — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root {
  /* Background + surfaces (warm near-black, low-saturation) */
  --bg-0: oklch(0.16 0.008 270);     /* page */
  --bg-1: oklch(0.20 0.010 270);     /* card */
  --bg-2: oklch(0.24 0.012 270);     /* raised / hover */
  --bg-3: oklch(0.28 0.014 270);     /* input / chip */
  --line: oklch(0.30 0.012 270 / 0.6);
  --line-strong: oklch(0.38 0.014 270 / 0.8);

  /* Text */
  --ink-0: oklch(0.97 0.003 270);    /* headline */
  --ink-1: oklch(0.86 0.006 270);    /* body */
  --ink-2: oklch(0.68 0.010 270);    /* secondary */
  --ink-3: oklch(0.52 0.012 270);    /* tertiary */

  /* Brand */
  --brand: oklch(0.68 0.16 285);
  --brand-soft: oklch(0.68 0.16 285 / 0.16);
  --brand-dim: oklch(0.55 0.12 285);

  /* Colorblind-safe AQI (ColorBrewer-ish, tuned for dark bg) */
  --aqi-good:      oklch(0.78 0.14 155);  /* green   0-50 */
  --aqi-mod:       oklch(0.85 0.16 95);   /* yellow  51-100 */
  --aqi-usg:       oklch(0.78 0.17 60);   /* orange  101-150 */
  --aqi-unh:       oklch(0.68 0.20 28);   /* red     151-200 */
  --aqi-vunh:      oklch(0.55 0.20 340);  /* purple  201-300 */
  --aqi-haz:       oklch(0.45 0.15 20);   /* maroon  301+ */

  --ok: oklch(0.78 0.14 155);
  --warn: oklch(0.85 0.16 85);
  --danger: oklch(0.68 0.20 28);

  --radius: 14px;
  --radius-sm: 10px;
  --shadow-1: 0 1px 0 0 oklch(1 0 0 / 0.04) inset, 0 1px 2px oklch(0 0 0 / 0.3);
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-serif: "Instrument Serif", "Iowan Old Style", "Palatino Linotype", Georgia, serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --font-ar: "Noto Kufi Arabic", "Inter", sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--ink-1); font-family: var(--font-sans); font-size: 14px; line-height: 1.45; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; }
html[dir="rtl"] body { font-family: var(--font-ar); }

button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
ul { list-style: none; padding: 0; margin: 0; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: oklch(0.32 0.012 270 / 0.6); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: oklch(0.40 0.014 270 / 0.8); border: 2px solid transparent; background-clip: padding-box; }

/* ————— util ————— */
.eyebrow { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; }
.kbd { font-family: var(--font-mono); font-size: 10.5px; padding: 2px 6px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 4px; color: var(--ink-2); }
.serif { font-family: var(--font-serif); font-weight: 400; letter-spacing: -0.01em; }
.mono { font-family: var(--font-mono); }
.tnum { font-variant-numeric: tabular-nums; }

/* AQI band chip */
.band {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 999px;
  background: oklch(1 0 0 / 0.04); border: 1px solid var(--line);
  color: var(--ink-1);
}
.band .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

/* primary card */
.card {
  background: linear-gradient(180deg, oklch(1 0 0 / 0.02), oklch(1 0 0 / 0) 60%), var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-1);
}

/* ————— app shell ————— */
.app {
  display: grid;
  grid-template-columns: 260px 1fr 380px;
  grid-template-rows: 58px 1fr;
  grid-template-areas:
    "nav  topbar topbar"
    "nav  main   side";
  height: 100vh;
  gap: 0;
}
html[dir="rtl"] .app {
  grid-template-columns: 380px 1fr 260px;
  grid-template-areas:
    "topbar topbar nav"
    "side   main   nav";
}

/* ————— left nav ————— */
.nav { grid-area: nav; border-right: 1px solid var(--line); display: flex; flex-direction: column; background: var(--bg-0); }
html[dir="rtl"] .nav { border-right: 0; border-left: 1px solid var(--line); }
.brand {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  height: 58px;
}
.brand-mark {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, var(--brand), oklch(0.55 0.18 310));
  display: grid; place-items: center;
  box-shadow: 0 6px 20px oklch(0.55 0.18 310 / 0.4), 0 0 0 1px oklch(1 0 0 / 0.06) inset;
}
.brand-mark svg { width: 16px; height: 16px; color: white; }
.brand-name { font-family: var(--font-serif); font-size: 20px; line-height: 1; color: var(--ink-0); }
.brand-sub { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.18em; color: var(--ink-3); text-transform: uppercase; margin-top: 2px; }

.nav-section { padding: 18px 12px 6px; }
.nav-section-title { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.18em; color: var(--ink-3); text-transform: uppercase; padding: 0 8px 8px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  font-size: 13px; color: var(--ink-2);
  width: 100%; text-align: left;
  position: relative;
}
html[dir="rtl"] .nav-item { text-align: right; }
.nav-item:hover { background: var(--bg-1); color: var(--ink-1); }
.nav-item.active { background: var(--bg-2); color: var(--ink-0); }
.nav-item.active::before {
  content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px;
  background: var(--brand); border-radius: 2px;
}
html[dir="rtl"] .nav-item.active::before { left: auto; right: 0; }
.nav-item svg { width: 16px; height: 16px; opacity: 0.85; flex-shrink: 0; }
.nav-item .count { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); background: var(--bg-2); padding: 1px 6px; border-radius: 10px; }
html[dir="rtl"] .nav-item .count { margin-left: 0; margin-right: auto; }

.nav-footer { margin-top: auto; padding: 14px 12px; border-top: 1px solid var(--line); }
.user-chip { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 8px; }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, oklch(0.78 0.14 40), oklch(0.68 0.18 340)); display: grid; place-items: center; font-size: 11px; font-weight: 600; color: white; }
.user-name { font-size: 12.5px; color: var(--ink-1); }
.user-role { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; }

/* ————— topbar ————— */
.topbar {
  grid-area: topbar;
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-0);
  height: 58px;
}
.crumb { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.08em; text-transform: uppercase; }
.crumb-sep { color: var(--ink-3); opacity: 0.4; }
.crumb-cur { color: var(--ink-1); }

.live {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 5px 10px; border-radius: 999px;
  background: oklch(0.78 0.14 155 / 0.14); color: var(--ok);
  border: 1px solid oklch(0.78 0.14 155 / 0.3);
}
.live .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 0 0 var(--ok); animation: pulse 1.8s infinite; }
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 oklch(0.78 0.14 155 / 0.6); }
  70% { box-shadow: 0 0 0 7px oklch(0.78 0.14 155 / 0); }
  100% { box-shadow: 0 0 0 0 oklch(0.78 0.14 155 / 0); }
}

.topbar-spacer { flex: 1; }
.search {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 999px;
  color: var(--ink-2);
  min-width: 260px;
}
.search svg { width: 14px; height: 14px; opacity: 0.7; }
.search input { background: none; border: 0; outline: none; color: var(--ink-1); font: inherit; flex: 1; }
.search input::placeholder { color: var(--ink-3); }

.icon-btn {
  display: inline-grid; place-items: center;
  width: 34px; height: 34px;
  border-radius: 8px;
  background: var(--bg-1); border: 1px solid var(--line);
  color: var(--ink-2);
  position: relative;
}
.icon-btn:hover { background: var(--bg-2); color: var(--ink-0); }
.icon-btn svg { width: 15px; height: 15px; }
.icon-btn .badge { position: absolute; top: -4px; right: -4px; background: var(--danger); color: white; font-family: var(--font-mono); font-size: 9.5px; font-weight: 600; padding: 1px 5px; border-radius: 8px; border: 2px solid var(--bg-0); }

/* Segmented control */
.seg {
  display: inline-flex;
  padding: 3px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 10px;
}
.seg-btn {
  padding: 5px 11px;
  font-size: 12px;
  color: var(--ink-2);
  border-radius: 7px;
  font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px;
}
.seg-btn:hover { color: var(--ink-0); }
.seg-btn.active { background: var(--bg-3); color: var(--ink-0); box-shadow: 0 1px 0 oklch(1 0 0 / 0.05) inset; }
.seg-btn svg { width: 12px; height: 12px; }

/* ————— main area ————— */
.main { grid-area: main; overflow: hidden; display: grid; grid-template-rows: auto 1fr; }

/* KPI strip */
.kpi-strip {
  display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr 1fr;
  gap: 1px;
  background: var(--line);
  border-bottom: 1px solid var(--line);
}
.kpi {
  background: var(--bg-0);
  padding: 14px 18px 16px;
  display: flex; flex-direction: column; gap: 6px;
  position: relative;
  min-width: 0;
}
.kpi-label { display: flex; align-items: center; gap: 6px; color: var(--ink-3); }
.kpi-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.kpi-value { font-family: var(--font-serif); font-size: 42px; line-height: 1; color: var(--ink-0); letter-spacing: -0.02em; }
.kpi-unit { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; }
.kpi-delta { font-family: var(--font-mono); font-size: 11.5px; display: inline-flex; align-items: center; gap: 3px; }
.kpi-delta.up { color: var(--danger); }
.kpi-delta.down { color: var(--ok); }
.kpi-spark { margin-top: 4px; height: 26px; }
.kpi-meta { font-size: 11.5px; color: var(--ink-2); }

/* main body — map + drawer */
.stage {
  position: relative;
  overflow: hidden;
  background: var(--bg-0);
}

/* Map */
.map {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 62% 42%, oklch(0.85 0.16 95 / 0.28), transparent 22%),
    radial-gradient(circle at 74% 52%, oklch(0.68 0.20 28 / 0.32), transparent 18%),
    radial-gradient(circle at 44% 58%, oklch(0.78 0.14 155 / 0.24), transparent 24%),
    radial-gradient(circle at 30% 34%, oklch(0.78 0.14 155 / 0.18), transparent 22%),
    radial-gradient(circle at 56% 28%, oklch(0.85 0.16 95 / 0.16), transparent 20%),
    var(--bg-0);
}
.map::before {
  /* Street grid */
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(0deg, oklch(0.32 0.01 270 / 0.35) 1px, transparent 1px),
    linear-gradient(90deg, oklch(0.32 0.01 270 / 0.35) 1px, transparent 1px),
    linear-gradient(0deg, oklch(0.28 0.01 270 / 0.2) 1px, transparent 1px),
    linear-gradient(90deg, oklch(0.28 0.01 270 / 0.2) 1px, transparent 1px);
  background-size: 120px 120px, 120px 120px, 30px 30px, 30px 30px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 85%);
  opacity: 0.7;
}
.map::after {
  content: "";
  position: absolute; inset: 0;
  background:
    linear-gradient(73deg, transparent 48%, oklch(0.38 0.012 270 / 0.6) 48.5%, oklch(0.38 0.012 270 / 0.6) 49%, transparent 49.5%),
    linear-gradient(15deg, transparent 32%, oklch(0.36 0.012 270 / 0.55) 32.5%, oklch(0.36 0.012 270 / 0.55) 33%, transparent 33.5%),
    linear-gradient(105deg, transparent 65%, oklch(0.36 0.012 270 / 0.45) 65.5%, oklch(0.36 0.012 270 / 0.45) 66%, transparent 66.5%);
  pointer-events: none;
}
.map-svg { position: absolute; inset: 0; width: 100%; height: 100%; }

/* Map labels */
.map-label {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-2);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  pointer-events: none;
  text-shadow: 0 0 8px var(--bg-0), 0 0 4px var(--bg-0);
}
.map-label.major { font-size: 13px; color: var(--ink-1); letter-spacing: 0.08em; font-weight: 500; }

/* Map floating panels */
.map-panel-tl, .map-panel-tr, .map-panel-bl, .map-panel-br {
  position: absolute; z-index: 3;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.map-panel-tl { top: 16px; left: 16px; }
.map-panel-tr { top: 16px; right: 16px; }
.map-panel-bl { bottom: 16px; left: 16px; }
.map-panel-br { bottom: 16px; right: 16px; }
html[dir="rtl"] .map-panel-tl { left: auto; right: 16px; }
html[dir="rtl"] .map-panel-tr { right: auto; left: 16px; }
html[dir="rtl"] .map-panel-bl { left: auto; right: 16px; }
html[dir="rtl"] .map-panel-br { right: auto; left: 16px; }

.glass {
  background: oklch(0.20 0.010 270 / 0.72);
  border: 1px solid var(--line);
  border-radius: 12px;
  box-shadow: 0 10px 30px oklch(0 0 0 / 0.4), 0 0 0 1px oklch(1 0 0 / 0.03) inset;
}

/* Map control stacks */
.map-tools { display: flex; flex-direction: column; gap: 6px; padding: 6px; }
.map-tool {
  width: 34px; height: 34px;
  display: grid; place-items: center;
  border-radius: 7px;
  color: var(--ink-2);
}
.map-tool:hover { background: var(--bg-2); color: var(--ink-0); }
.map-tool.active { background: var(--bg-3); color: var(--ink-0); }
.map-tool svg { width: 14px; height: 14px; }
.map-tool-sep { height: 1px; background: var(--line); margin: 2px 4px; }

/* Legend */
.legend { padding: 12px 14px; min-width: 220px; }
.legend-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.legend-ramp { display: grid; grid-template-columns: repeat(6, 1fr); height: 8px; border-radius: 4px; overflow: hidden; }
.legend-ramp > div { height: 100%; }
.legend-scale { display: flex; justify-content: space-between; margin-top: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
.legend-bands { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; margin-top: 10px; font-size: 11.5px; }
.legend-row { display: flex; align-items: center; gap: 6px; color: var(--ink-2); }
.legend-row .sw { width: 10px; height: 10px; border-radius: 2px; }

/* Pollutant switcher overlay */
.pollutants {
  display: inline-flex;
  padding: 4px;
  gap: 2px;
  background: oklch(0.20 0.010 270 / 0.78);
  border: 1px solid var(--line);
  border-radius: 10px;
  backdrop-filter: blur(12px);
}
.pollutant-pill {
  padding: 6px 11px;
  border-radius: 7px;
  font-size: 12px;
  color: var(--ink-2);
  display: inline-flex; align-items: center; gap: 7px;
}
.pollutant-pill:hover { background: var(--bg-2); color: var(--ink-0); }
.pollutant-pill.active { background: var(--brand-soft); color: var(--ink-0); box-shadow: 0 0 0 1px var(--brand) inset; }
.pollutant-pill .val { font-family: var(--font-mono); color: var(--ink-3); font-size: 10.5px; }
.pollutant-pill.active .val { color: var(--ink-1); }

/* Sensor markers */
.sensor {
  position: absolute; width: 14px; height: 14px; border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 0 3px oklch(0 0 0 / 0.35), 0 0 12px var(--_c, var(--aqi-good));
  background: var(--_c, var(--aqi-good));
  cursor: pointer;
  transition: transform 0.15s ease;
}
.sensor::before {
  content: "";
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 1px solid var(--_c, var(--aqi-good));
  opacity: 0.35;
}
.sensor:hover { transform: translate(-50%, -50%) scale(1.3); z-index: 5; }
.sensor.pulse-ring::after {
  content: ""; position: absolute; inset: -4px; border-radius: 50%;
  border: 1.5px solid var(--_c, var(--aqi-good));
  animation: ring 2s infinite;
}
@keyframes ring {
  0% { transform: scale(0.8); opacity: 0.9; }
  100% { transform: scale(2.4); opacity: 0; }
}

/* Sensor tooltip */
.tooltip {
  position: absolute; z-index: 10;
  background: oklch(0.16 0.008 270 / 0.95);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  padding: 10px 12px;
  min-width: 200px;
  pointer-events: none;
  box-shadow: 0 10px 30px oklch(0 0 0 / 0.6);
  font-size: 12px;
  transform: translate(-50%, calc(-100% - 14px));
}
.tooltip-title { display: flex; justify-content: space-between; margin-bottom: 6px; }
.tooltip-name { font-weight: 500; color: var(--ink-0); }
.tooltip-row { display: flex; justify-content: space-between; padding: 2px 0; color: var(--ink-2); }
.tooltip-row .v { color: var(--ink-0); font-family: var(--font-mono); }

/* ————— right side rail ————— */
.side {
  grid-area: side;
  border-left: 1px solid var(--line);
  background: var(--bg-0);
  overflow-y: auto;
  overflow-x: hidden;
}
html[dir="rtl"] .side { border-left: 0; border-right: 1px solid var(--line); }
.side-group { padding: 18px 20px; border-bottom: 1px solid var(--line); }
.side-group:last-child { border-bottom: 0; }
.side-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.side-title { font-family: var(--font-serif); font-size: 22px; color: var(--ink-0); line-height: 1.1; letter-spacing: -0.01em; }
.side-title .cnt { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-left: 8px; letter-spacing: 0.08em; vertical-align: 4px; }
html[dir="rtl"] .side-title .cnt { margin-left: 0; margin-right: 8px; }

/* Hotspots list */
.hotspot {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid transparent;
  cursor: pointer;
  position: relative;
}
.hotspot:hover { background: var(--bg-1); border-color: var(--line); }
.hotspot.selected { background: var(--bg-1); border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
.hotspot-rank { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); min-width: 16px; letter-spacing: 0.06em; }
.hotspot-name { font-size: 13px; color: var(--ink-0); font-weight: 500; }
.hotspot-coord { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); margin-top: 2px; }
.hotspot-val { text-align: right; }
html[dir="rtl"] .hotspot-val { text-align: left; }
.hotspot-val .n { font-family: var(--font-serif); font-size: 24px; line-height: 1; letter-spacing: -0.01em; }
.hotspot-val .u { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; }
.hotspot-val.good .n { color: var(--aqi-good); }
.hotspot-val.mod .n { color: var(--aqi-mod); }
.hotspot-val.usg .n { color: var(--aqi-usg); }
.hotspot-val.unh .n { color: var(--aqi-unh); }
.hotspot-val.vunh .n { color: var(--aqi-vunh); }

/* Pollutant breakdown cards */
.pollutant-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.pcard { padding: 11px 12px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px; cursor: pointer; position: relative; }
.pcard:hover { background: var(--bg-2); }
.pcard.active { border-color: var(--brand); background: oklch(0.68 0.16 285 / 0.10); }
.pcard-head { display: flex; justify-content: space-between; align-items: center; }
.pcard-name { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--ink-0); letter-spacing: 0.04em; }
.pcard-name .sub { font-weight: 400; color: var(--ink-3); font-size: 9px; }
.pcard-val { font-family: var(--font-serif); font-size: 26px; line-height: 1.1; color: var(--ink-0); letter-spacing: -0.01em; margin-top: 4px; }
.pcard-unit { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); margin-left: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
.pcard-bar { height: 3px; border-radius: 2px; background: var(--bg-3); overflow: hidden; margin-top: 8px; }
.pcard-bar .fill { height: 100%; border-radius: 2px; }
.pcard-delta { font-family: var(--font-mono); font-size: 10.5px; }
.pcard-delta.up { color: var(--danger); }
.pcard-delta.down { color: var(--ok); }

/* weather */
.weather-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
.weather-cell { background: var(--bg-1); padding: 12px; }
.weather-cell .l { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.1em; }
.weather-cell .v { font-family: var(--font-serif); font-size: 24px; color: var(--ink-0); line-height: 1.1; margin-top: 2px; letter-spacing: -0.01em; }
.weather-cell .u { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; }

.wind-compass { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding: 10px 12px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px; }
.compass { width: 52px; height: 52px; border-radius: 50%; border: 1px solid var(--line-strong); position: relative; flex-shrink: 0; background: radial-gradient(circle, var(--bg-2) 40%, transparent 60%); }
.compass::before, .compass::after { position: absolute; font-family: var(--font-mono); font-size: 9px; color: var(--ink-3); }
.compass::before { content: "N"; top: 2px; left: 50%; transform: translateX(-50%); }
.compass::after { content: "S"; bottom: 2px; left: 50%; transform: translateX(-50%); }
.compass-arrow { position: absolute; inset: 0; display: grid; place-items: center; }
.compass-arrow svg { width: 24px; height: 24px; color: var(--brand); }
.wind-meta .hd { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.1em; }
.wind-meta .dir { font-family: var(--font-serif); font-size: 22px; color: var(--ink-0); line-height: 1.1; letter-spacing: -0.01em; }
.wind-meta .sub { font-size: 11.5px; color: var(--ink-2); margin-top: 2px; }

/* forecast */
.forecast { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin-top: 12px; }
.f-cell { background: var(--bg-1); padding: 10px 6px; text-align: center; }
.f-hr { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.04em; }
.f-val { font-family: var(--font-serif); font-size: 18px; color: var(--ink-0); line-height: 1.1; margin: 4px 0; }
.f-dot { width: 8px; height: 8px; border-radius: 50%; margin: 0 auto; }

/* source attribution */
.src-bar { height: 18px; display: flex; border-radius: 4px; overflow: hidden; margin-top: 8px; }
.src-bar > div { display: grid; place-items: center; font-family: var(--font-mono); font-size: 9.5px; color: oklch(0 0 0 / 0.8); font-weight: 600; }
.src-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; margin-top: 8px; font-size: 11.5px; }
.src-row { display: flex; align-items: center; gap: 6px; color: var(--ink-2); }
.src-row .sw { width: 9px; height: 9px; border-radius: 2px; }
.src-row .pct { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-1); }

/* alerts feed */
.alert {
  display: grid; grid-template-columns: auto 1fr auto; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  align-items: flex-start;
}
.alert:last-child { border-bottom: 0; }
.alert-icon { width: 24px; height: 24px; border-radius: 6px; display: grid; place-items: center; flex-shrink: 0; }
.alert-icon svg { width: 12px; height: 12px; }
.alert-icon.crit { background: oklch(0.68 0.20 28 / 0.16); color: var(--aqi-unh); }
.alert-icon.warn { background: oklch(0.85 0.16 85 / 0.16); color: var(--aqi-mod); }
.alert-icon.info { background: oklch(0.68 0.16 285 / 0.16); color: var(--brand); }
.alert-icon.ok { background: oklch(0.78 0.14 155 / 0.16); color: var(--ok); }
.alert-body .t { font-size: 12.5px; color: var(--ink-1); }
.alert-body .t b { color: var(--ink-0); font-weight: 500; }
.alert-body .m { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
.alert-time { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); white-space: nowrap; }

/* ————— drawer (hotspot detail) ————— */
.drawer {
  position: absolute; top: 0; bottom: 0; right: 0;
  width: 420px;
  background: var(--bg-0);
  border-left: 1px solid var(--line);
  z-index: 12;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  box-shadow: -20px 0 40px oklch(0 0 0 / 0.4);
}
html[dir="rtl"] .drawer { right: auto; left: 0; border-left: 0; border-right: 1px solid var(--line); transform: translateX(-100%); box-shadow: 20px 0 40px oklch(0 0 0 / 0.4); }
.drawer.open { transform: translateX(0); }
.drawer-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.drawer-body { padding: 18px 20px; overflow-y: auto; }
.drawer h3 { font-family: var(--font-serif); font-size: 26px; color: var(--ink-0); margin: 0; letter-spacing: -0.01em; line-height: 1.15; }
.drawer .coord { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: 4px; letter-spacing: 0.06em; }

/* range picker */
.range-picker { display: inline-flex; padding: 3px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 8px; }
.range-picker button { padding: 4px 10px; font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); border-radius: 5px; letter-spacing: 0.04em; text-transform: uppercase; }
.range-picker button.active { background: var(--bg-3); color: var(--ink-0); }

/* chart */
.chart-wrap { padding: 2px 0 0; }
.chart-svg { width: 100%; display: block; overflow: visible; }
.chart-label { font-family: var(--font-mono); font-size: 9.5px; fill: var(--ink-3); letter-spacing: 0.04em; }
.chart-grid { stroke: var(--line); stroke-dasharray: 2 4; }

/* footnote status bar */
.statusbar {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; align-items: center; gap: 20px;
  padding: 7px 16px;
  background: oklch(0.16 0.008 270 / 0.85);
  backdrop-filter: blur(8px);
  border-top: 1px solid var(--line);
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.statusbar .item { display: inline-flex; align-items: center; gap: 6px; }
.statusbar .item .d { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }
.statusbar .spacer { flex: 1; }

/* Sparkline */
.spark-path { fill: none; stroke-width: 1.5; }

/* event banner */
.banner {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  background: linear-gradient(90deg, oklch(0.68 0.20 28 / 0.16), oklch(0.68 0.20 28 / 0.02));
  border: 1px solid oklch(0.68 0.20 28 / 0.4);
  border-radius: 10px;
  margin: 12px 20px 0;
}
.banner-icon { width: 28px; height: 28px; border-radius: 50%; background: oklch(0.68 0.20 28 / 0.22); display: grid; place-items: center; color: var(--danger); flex-shrink: 0; }
.banner-title { font-size: 12.5px; color: var(--ink-0); font-weight: 500; }
.banner-sub { font-size: 11.5px; color: var(--ink-2); margin-top: 1px; }
.banner-cta { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-1); text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 10px; background: oklch(1 0 0 / 0.05); border: 1px solid var(--line); border-radius: 6px; white-space: nowrap; }

/* buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; border: 1px solid var(--line); background: var(--bg-1); color: var(--ink-1); }
.btn:hover { background: var(--bg-2); }
.btn.primary { background: var(--brand); border-color: var(--brand); color: white; }
.btn.primary:hover { background: oklch(0.72 0.16 285); }
.btn svg { width: 13px; height: 13px; }

/* small helpers */
.divider { height: 1px; background: var(--line); }
.row-flex { display: flex; align-items: center; gap: 8px; }
.row-between { display: flex; align-items: center; justify-content: space-between; }
.gap-tight { gap: 6px; }

</style>
